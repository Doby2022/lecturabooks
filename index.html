<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Doby Books Premium</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, collection, query, orderBy, onSnapshot, deleteDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js';

        const firebaseConfig = {
            apiKey: "AIzaSyA5gtr-dyzd_nrW7Qn8mID_866lm1djGas",
            authDomain: "books-cosmin.firebaseapp.com",
            projectId: "books-cosmin",
            storageBucket: "books-cosmin.appspot.com",
            messagingSenderId: "437758651461",
            appId: "1:437758651461:web:a6b4e31b2b6ddc5baf472c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        window._fb = { auth, db, storage, provider, signInWithPopup, signOut, onAuthStateChanged, doc, setDoc, collection, query, orderBy, onSnapshot, deleteDoc, updateDoc, ref, uploadBytes, getDownloadURL, deleteObject };
    </script>

    <style>
        :root { --bg: #f4ecd8; --text: #2c241a; --accent: #8b5e2a; }
        body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Crimson Pro', serif; margin: 0; padding: 0; }
        
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--accent); font-weight: bold; }

        .lib-grid { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        
        .book-card { cursor: pointer; position: relative; width: 100%; }
        .cover-wrapper { 
            aspect-ratio: 2/3; background: #d0c4af; border-radius: 10px; overflow: hidden; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); position: relative;
            background-size: cover; background-position: center; border: 1px solid rgba(0,0,0,0.05);
        }
        
        .progress-badge { 
            position: absolute; bottom: 12px; right: 12px; 
            width: 45px; height: 45px; background: rgba(30,25,20,0.95); 
            border: 2.5px solid var(--accent); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: #fff; font-size: 13px; font-weight: bold; z-index: 10;
        }

        .book-title { font-size: 14px; margin-top: 10px; font-weight: 600; text-align: center; color: var(--text); display: block; }

        /* CITITOR */
        #screen-reader { position: fixed; inset: 0; z-index: 3000; background: var(--bg); display: none; flex-direction: column; }
        .reader-hud { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(255,255,255,0.1); border-bottom: 1px solid rgba(0,0,0,0.05); }
        #viewer-container { flex: 1; position: relative; }
        #viewer { height: 100%; width: 100%; }

        .tap-zone { position: absolute; top: 0; bottom: 0; width: 30%; z-index: 100; cursor: pointer; }
        .tap-left { left: 0; } .tap-right { right: 0; }

        .del-btn { position: absolute; top: -10px; left: -10px; background: #ff4444; color: white; border: none; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; z-index: 20; font-weight: bold; }
        .btn-add-main { display: block; margin: 20px auto; background: var(--accent); color: white; border: none; padding: 12px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; font-family: inherit; font-size: 16px; }

        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #2c241a; color: #fff; padding: 10px 20px; border-radius: 25px; display: none; z-index: 4000; font-size: 14px; }
    </style>
</head>
<body>

    <div id="screen-library">
        <div class="header">
            <div class="logo">DOBY BOOKS</div>
            <div id="user-area"><button onclick="login()" style="background:none; border:1px solid var(--accent); padding:5px 15px; border-radius:15px; cursor:pointer;">Login</button></div>
        </div>
        
        <button class="btn-add-main" onclick="triggerFileInput()">+ ADAUGĂ CARTE</button>
        
        <div class="lib-grid" id="lib-grid"></div>
    </div>

    <div id="screen-reader">
        <div class="reader-hud">
            <button onclick="closeBook()" style="background:none; border:none; font-weight:bold; cursor:pointer; color:var(--accent);">← ÎNAPOI</button>
            <div id="reader-pct" style="font-weight:bold;">0%</div>
            <div style="width: 50px;"></div>
        </div>
        <div id="viewer-container">
            <div class="tap-zone tap-left" onclick="prevPage()"></div>
            <div class="tap-zone tap-right" onclick="nextPage()"></div>
            <div id="viewer"></div>
        </div>
    </div>

    <input type="file" id="file-input" accept=".epub,.pdf" hidden onchange="uploadFile(event)">
    <div id="toast"></div>

    <script>
        let S = { user: null, books: [], currentBook: null, rendition: null };

        // 1. Initializare Auth
        window.addEventListener('DOMContentLoaded', () => {
            const check = setInterval(() => {
                if (window._fb) {
                    clearInterval(check);
                    window._fb.onAuthStateChanged(window._fb.auth, user => {
                        S.user = user;
                        if (user) {
                            document.getElementById('user-area').innerHTML = `<img src="${user.photoURL}" style="width:35px; border-radius:50%; border:2px solid var(--accent);">`;
                            listenBooks();
                        }
                    });
                }
            }, 500);
        });

        // 2. Control Tastatura
        window.addEventListener('keydown', e => {
            if (e.key === "ArrowLeft") prevPage();
            if (e.key === "ArrowRight") nextPage();
        });

        // 3. Functii de Baza
        async function login() { 
            try { await window._fb.signInWithPopup(window._fb.auth, window._fb.provider); } 
            catch(e) { msg("Eroare Login"); }
        }

        function triggerFileInput() { document.getElementById('file-input').click(); }

        function listenBooks() {
            const q = window._fb.query(window._fb.collection(window._fb.db, 'users', S.user.uid, 'books'), window._fb.orderBy('addedAt', 'desc'));
            window._fb.onSnapshot(q, snap => {
                S.books = snap.docs.map(d => d.data());
                renderLibrary();
            });
        }

        async function uploadFile(e) {
            const file = e.target.files[0];
            if (!file || !S.user) return;
            const id = 'book_' + Date.now();
            const ext = file.name.split('.').pop().toLowerCase();
            msg("Se încarcă...");

            try {
                const storageRef = window._fb.ref(window._fb.storage, `users/${S.user.uid}/books/${id}.${ext}`);
                await window._fb.uploadBytes(storageRef, file);
                const url = await window._fb.getDownloadURL(storageRef);

                await window._fb.setDoc(window._fb.doc(window._fb.db, 'users', S.user.uid, 'books', id), {
                    id, title: file.name.replace(/\.[^/.]+$/, ""), url, format: ext, progress: 0, addedAt: Date.now()
                });
                msg("Finalizat!");
            } catch(err) { msg("Eroare Upload"); }
        }

        function renderLibrary() {
            const grid = document.getElementById('lib-grid');
            grid.innerHTML = S.books.map(b => `
                <div class="book-card" onclick="openBook('${b.id}')">
                    <button class="del-btn" onclick="deleteBook('${b.id}', '${b.format}', event)">✕</button>
                    <div class="cover-wrapper" style="background-image: url('${b.cover || ''}')">
                        <div class="progress-badge">${Math.round((b.progress || 0) * 100)}%</div>
                    </div>
                    <span class="book-title">${b.title}</span>
                </div>
            `).join('');
        }

        async function openBook(id) {
            const book = S.books.find(b => b.id === id);
            if (!book) return;
            S.currentBook = book;
            document.getElementById('screen-reader').style.display = 'flex';

            if (book.format === 'epub') {
                const epub = ePub(book.url);
                S.rendition = epub.renderTo("viewer", { width: "100%", height: "100%", flow: "paginated" });
                await S.rendition.display(book.cfi || undefined);

                // Extragere coperta daca lipseste
                if (!book.cover) {
                    epub.coverUrl().then(url => {
                        if (url) window._fb.updateDoc(window._fb.doc(window._fb.db, 'users', S.user.uid, 'books', id), { cover: url });
                    });
                }

                S.rendition.on("relocated", loc => {
                    const pct = epub.locations.percentageFromCfi(loc.start.cfi);
                    saveProg(pct, loc.start.cfi);
                });
                epub.ready.then(() => epub.locations.generate(1024));
            } else {
                document.getElementById('viewer').innerHTML = `<iframe src="${book.url}" style="width:100%; height:100%; border:none;"></iframe>`;
            }
        }

        function prevPage() { if(S.rendition) S.rendition.prev(); }
        function nextPage() { if(S.rendition) S.rendition.next(); }

        async function saveProg(p, cfi) {
            if (!S.currentBook || isNaN(p)) return;
            document.getElementById('reader-pct').textContent = Math.round(p * 100) + "%";
            await window._fb.updateDoc(window._fb.doc(window._fb.db, 'users', S.user.uid, 'books', S.currentBook.id), { progress: p, cfi: cfi });
        }

        function closeBook() {
            if (S.rendition) { S.rendition.destroy(); S.rendition = null; }
            document.getElementById('screen-reader').style.display = 'none';
            document.getElementById('viewer').innerHTML = "";
        }

        async function deleteBook(id, ext, e) {
            e.stopPropagation();
            if (!confirm("Ștergi definitiv?")) return;
            await window._fb.deleteDoc(window._fb.doc(window._fb.db, 'users', S.user.uid, 'books', id));
            await window._fb.deleteObject(window._fb.ref(window._fb.storage, `users/${S.user.uid}/books/${id}.${ext}`));
        }

        function msg(m) {
            const t = document.getElementById('toast');
            t.textContent = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
