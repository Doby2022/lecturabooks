<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Doby Books Cloud</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">

    <!-- Biblioteci esentiale -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, collection, query, orderBy, onSnapshot, deleteDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js';

        const firebaseConfig = {
            apiKey: "AIzaSyA5gtr-dyzd_nrW7Qn8mID_866lm1djGas",
            authDomain: "books-cosmin.firebaseapp.com",
            projectId: "books-cosmin",
            storageBucket: "books-cosmin.appspot.com",
            messagingSenderId: "437758651461",
            appId: "1:437758651461:web:a6b4e31b2b6ddc5baf472c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        window._fb = { auth, db, storage, provider, signInWithPopup, signOut, onAuthStateChanged, doc, setDoc, collection, query, orderBy, onSnapshot, deleteDoc, updateDoc, ref, uploadBytes, getDownloadURL, deleteObject };
    </script>

    <style>
        :root { --bg: #f4ecd8; --text: #2c241a; --accent: #8b5e2a; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Crimson Pro', serif; overflow-x: hidden; }
        
        /* HEADER & TOOLBAR */
        .header { padding: 20px; display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto; }
        .logo { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: var(--accent); font-weight: bold; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; display: block; margin: 0 auto 20px; font-size: 16px; }

        /* GRID CARTI */
        .lib-grid { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .book-card { cursor: pointer; position: relative; transition: 0.2s; }
        .cover-box { 
            aspect-ratio: 2/3; background: #d0c4af; border-radius: 8px; overflow: hidden; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.15); position: relative;
            background-size: cover; background-position: center;
        }
        
        /* CERC PROGRES MARE */
        .progress-circle { 
            position: absolute; bottom: 10px; right: 10px; 
            width: 42px; height: 42px; background: rgba(30,25,20,0.9); 
            border: 2px solid var(--accent); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: bold; font-size: 12px; z-index: 5;
        }

        .title-label { font-size: 13px; margin-top: 8px; text-align: center; display: block; font-weight: 600; }

        /* CITITOR FIXED */
        #reader-screen { position: fixed; inset: 0; z-index: 5000; background: var(--bg); display: none; flex-direction: column; }
        .reader-nav { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid rgba(0,0,0,0.05); }
        #viewer { flex: 1; position: relative; }
        
        .tap-zone { position: absolute; top: 0; bottom: 0; width: 30%; z-index: 100; cursor: pointer; }
        .tap-prev { left: 0; } .tap-next { right: 0; }

        .btn-del { position: absolute; top: -8px; left: -8px; background: #ff4444; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; z-index: 10; font-size: 11px; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 8px 16px; border-radius: 20px; display: none; z-index: 6000; }
    </style>
</head>
<body>

    <div id="lib-screen">
        <div class="header">
            <div class="logo">DOBY BOOKS</div>
            <div id="user-ui"><button onclick="login()" style="background:none; border:1px solid var(--accent); border-radius:15px; padding:5px 15px; cursor:pointer;">Login</button></div>
        </div>
        <button class="btn-add" onclick="document.getElementById('file-in').click()">+ ADAUGĂ CARTE</button>
        <div class="lib-grid" id="grid"></div>
    </div>

    <div id="reader-screen">
        <div class="reader-nav">
            <button onclick="exitReader()" style="background:none; border:none; font-weight:bold; color:var(--accent); cursor:pointer;">← ÎNAPOI</button>
            <div id="nav-pct" style="font-weight:bold;">0%</div>
            <div style="width:50px;"></div>
        </div>
        <div id="viewer">
            <div class="tap-zone tap-prev" onclick="goPrev()"></div>
            <div class="tap-zone tap-next" onclick="goNext()"></div>
            <div id="epub-area" style="height:100%;"></div>
        </div>
    </div>

    <input type="file" id="file-in" accept=".epub,.pdf" hidden onchange="doUpload(event)">
    <div id="toast"></div>

    <script>
        let state = { user: null, books: [], current: null, rend: null };

        // INITIALIZARE
        window.addEventListener('DOMContentLoaded', () => {
            const timer = setInterval(() => {
                if (window._fb) {
                    clearInterval(timer);
                    window._fb.onAuthStateChanged(window._fb.auth, user => {
                        state.user = user;
                        if (user) {
                            document.getElementById('user-ui').innerHTML = `<img src="${user.photoURL}" style="width:30px; border-radius:50%; border:2px solid var(--accent);">`;
                            syncBooks();
                        }
                    });
                }
            }, 500);
        });

        async function login() { try { await window._fb.signInWithPopup(window._fb.auth, window._fb.provider); } catch(e) { alert("Eroare Login"); } }

        function syncBooks() {
            const q = window._fb.query(window._fb.collection(window._fb.db, 'users', state.user.uid, 'books'), window._fb.orderBy('addedAt', 'desc'));
            window._fb.onSnapshot(q, snap => {
                state.books = snap.docs.map(d => d.data());
                renderGrid();
            });
        }

        async function doUpload(e) {
            const file = e.target.files[0];
            if (!file || !state.user) return;
            const id = 'b_' + Date.now();
            const ext = file.name.split('.').pop().toLowerCase();
            
            showMsg("Se încarcă în Cloud...");
            try {
                const sRef = window._fb.ref(window._fb.storage, `books/${state.user.uid}/${id}.${ext}`);
                await window._fb.uploadBytes(sRef, file);
                const url = await window._fb.getDownloadURL(sRef);

                await window._fb.setDoc(window._fb.doc(window._fb.db, 'users', state.user.uid, 'books', id), {
                    id, title: file.name.replace(/\.[^/.]+$/, ""), url, format: ext, progress: 0, addedAt: Date.now()
                });
                showMsg("Gata!");
            } catch(err) { showMsg("Eroare Upload"); }
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = state.books.map(b => `
                <div class="book-card" onclick="openMe('${b.id}')">
                    <button class="btn-del" onclick="delMe('${b.id}', '${b.format}', event)">✕</button>
                    <div class="cover-box" style="background-image: url('${b.cover || ''}')">
                        <div class="progress-circle">${Math.round((b.progress || 0) * 100)}%</div>
                    </div>
                    <span class="title-label">${b.title}</span>
                </div>
            `).join('');
        }

        async function openMe(id) {
            const book = state.books.find(b => b.id === id);
            state.current = book;
            document.getElementById('reader-screen').style.display = 'flex';

            if (book.format === 'epub') {
                const epub = ePub(book.url);
                state.rend = epub.renderTo("epub-area", { width: "100%", height: "100%", flow: "paginated" });
                await state.rend.display(book.cfi || undefined);

                // EXTRAGERE COPERTA (SILENT)
                if (!book.cover) {
                    epub.coverUrl().then(cUrl => {
                        if (cUrl) window._fb.updateDoc(window._fb.doc(window._fb.db, 'users', state.user.uid, 'books', id), { cover: cUrl });
                    }).catch(() => {});
                }

                state.rend.on("relocated", loc => {
                    const p = epub.locations.percentageFromCfi(loc.start.cfi);
                    updateProg(p, loc.start.cfi);
                });
                epub.ready.then(() => epub.locations.generate(1024));
            } else {
                document.getElementById('epub-area').innerHTML = `<iframe src="${book.url}" style="width:100%; height:100%; border:none;"></iframe>`;
            }
        }

        function goPrev() { if(state.rend) state.rend.prev(); }
        function goNext() { if(state.rend) state.rend.next(); }

        async function updateProg(p, cfi) {
            if (!state.current || isNaN(p)) return;
            document.getElementById('nav-pct').textContent = Math.round(p * 100) + "%";
            await window._fb.updateDoc(window._fb.doc(window._fb.db, 'users', state.user.uid, 'books', state.current.id), { progress: p, cfi: cfi });
        }

        function exitReader() {
            if (state.rend) { state.rend.destroy(); state.rend = null; }
            document.getElementById('reader-screen').style.display = 'none';
            document.getElementById('epub-area').innerHTML = "";
        }

        async function delMe(id, ext, e) {
            e.stopPropagation();
            if (!confirm("Ștergi?")) return;
            await window._fb.deleteDoc(window._fb.doc(window._fb.db, 'users', state.user.uid, 'books', id));
            await window._fb.deleteObject(window._fb.ref(window._fb.storage, `books/${state.user.uid}/${id}.${ext}`));
        }

        function showMsg(m) {
            const t = document.getElementById('toast');
            t.textContent = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
