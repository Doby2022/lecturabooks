<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lectură - Stabil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Crimson+Pro:wght@400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, getDocs, collection } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyA5gtr-dyzd_nrW7Qn8mID_866lm1djGas",
    authDomain: "books-cosmin.firebaseapp.com",
    projectId: "books-cosmin",
    storageBucket: "books-cosmin.firebasestorage.app",
    messagingSenderId: "437758651461",
    appId: "1:437758651461:web:a6b4e31b2b6ddc5baf472c"
  };

  const app = initializeApp(firebaseConfig);
  window._fb = { auth: getAuth(app), db: getFirestore(app), provider: new GoogleAuthProvider(), signInWithPopup, onAuthStateChanged, doc, setDoc, getDocs, collection };
</script>

<style>
:root { --bg: #f7f2e8; --text: #2a1f0e; --accent: #8b5e2a; --card: #e8dfcc; }
body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Crimson Pro', serif; overflow-x: hidden; }

.screen { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; transition: 0.3s; }
.hidden { display: none; }

.header { padding: 20px 28px; display: flex; justify-content: space-between; align-items: center; }
.btn-main { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 20px; cursor: pointer; font-weight: bold; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; padding: 28px; }
.card { cursor: pointer; background: var(--card); border-radius: 8px; padding: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
.pct-tag { font-size: 14px; font-weight: bold; color: var(--accent); margin-top: 8px; display: block; }

#reader { z-index: 100; }
.reader-top { height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid rgba(0,0,0,0.1); }
#viewer { flex: 1; }

.nav-zones { position: fixed; top: 50px; bottom: 0; width: 100%; display: flex; pointer-events: none; }
.zone { flex: 1; pointer-events: auto; cursor: pointer; }

#msg { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; display: none; }
</style>
</head>
<body>

<div id="screen-lib" class="screen">
  <div class="header">
    <div style="font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: bold;">DOBY BOOKS</div>
    <div id="user-ui"></div>
  </div>
  <button class="btn-main" style="margin: 0 28px;" onclick="document.getElementById('fin').click()">+ ADAUGĂ CARTE</button>
  <div class="grid" id="grid"></div>
</div>

<div id="reader" class="screen hidden">
  <div class="reader-top">
    <button onclick="exitReader()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:bold;">← BIBLIOTECĂ</button>
    <div id="reader-pct" style="font-weight:bold; color:var(--accent);">0%</div>
  </div>
  <div id="viewer"></div>
  <div class="nav-zones">
    <div class="zone" onclick="S.rend.prev()"></div>
    <div class="zone" onclick="S.rend.next()"></div>
  </div>
</div>

<input type="file" id="fin" accept=".epub" hidden onchange="handleFile(event)">
<div id="msg"></div>

<script>
let S = { user: null, books: [], epub: null, rend: null, currentId: null };

window.addEventListener('DOMContentLoaded', () => {
  const itv = setInterval(() => {
    if (window._fb) {
      clearInterval(itv);
      window._fb.onAuthStateChanged(window._fb.auth, user => {
        S.user = user;
        if (user) {
          document.getElementById('user-ui').textContent = user.displayName;
          loadFromCloud();
        } else {
          document.getElementById('user-ui').innerHTML = `<button onclick="window._fb.signInWithPopup(window._fb.auth, window._fb.provider)">Login</button>`;
        }
      });
    }
  }, 500);
});

async function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const buffer = await file.arrayBuffer();
  const id = 'b_' + Date.now();
  await idbSet(id, buffer);
  S.books.push({ id, title: file.name.replace('.epub',''), progress: 0 });
  saveLocally();
  render();
}

async function openBook(id) {
  const book = S.books.find(b => b.id === id);
  const buffer = await idbGet(id);
  if (!buffer) return alert("Re-încarcă fișierul.");
  
  S.currentId = id;
  document.getElementById('screen-lib').classList.add('hidden');
  document.getElementById('reader').classList.remove('hidden');
  
  if (S.epub) S.epub.destroy();
  S.epub = ePub(buffer);
  S.rend = S.epub.renderTo("viewer", { width: "100%", height: "100%", flow: "paginated" });
  
  await S.rend.display(book.cfi || undefined);

  // LOGICA NOUĂ DE PROGRES (Bazată pe capitole/spine)
  S.rend.on("relocated", location => {
    const cfi = location.start.cfi;
    const totalCap = S.epub.spine.length;
    const currentCap = location.start.index;
    const pct = currentCap / (totalCap - 1);
    
    document.getElementById('reader-pct').textContent = Math.round(pct * 100) + "%";
    
    book.progress = pct;
    book.cfi = cfi;
    saveLocally();
    sync(id);
  });
}

function exitReader() {
  document.getElementById('screen-lib').classList.remove('hidden');
  document.getElementById('reader').classList.add('hidden');
  render();
}

function render() {
  const g = document.getElementById('grid');
  g.innerHTML = S.books.map(b => `
    <div class="card" onclick="openBook('${b.id}')">
      <div style="font-size: 40px;">📖</div>
      <div style="font-size: 14px; font-weight: bold; margin-top: 10px;">${b.title}</div>
      <span class="pct-tag">${Math.round((b.progress || 0) * 100)}%</span>
    </div>
  `).join('');
}

function saveLocally() { localStorage.setItem('lecturaBooks', JSON.stringify(S.books)); }
function loadLocally() { const r = localStorage.getItem('lecturaBooks'); if (r) S.books = JSON.parse(r); }
loadLocally();

async function sync(id) {
  if (!S.user) return;
  const b = S.books.find(x => x.id === id);
  await window._fb.setDoc(window._fb.doc(window._fb.db, 'users', S.user.uid, 'books', id), { ...b, updatedAt: Date.now() });
}

async function loadFromCloud() {
  const snap = await window._fb.getDocs(window._fb.collection(window._fb.db, 'users', S.user.uid, 'books'));
  snap.forEach(d => {
    const cloud = d.data();
    const local = S.books.find(x => x.id === cloud.id);
    if (!local) S.books.push(cloud);
    else if (cloud.updatedAt > (local.updatedAt || 0)) { local.progress = cloud.progress; local.cfi = cloud.cfi; }
  });
  render();
}

async function idbOpen() { return new Promise(res => { const r = indexedDB.open('DB', 1); r.onupgradeneeded = e => e.target.result.createObjectStore('f'); r.onsuccess = e => res(e.target.result); }); }
async function idbSet(k, v) { const db = await idbOpen(); db.transaction('f','readwrite').objectStore('f').put(v, k); }
async function idbGet(k) { const db = await idbOpen(); return new Promise(res => { const r = db.transaction('f').objectStore('f').get(k); r.onsuccess = () => res(r.result); }); }
</script>
</body>
</html>
