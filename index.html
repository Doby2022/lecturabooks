<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1410">
    <title>Lectură Cloud - Cosmin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

    <!-- Biblioteci externe -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, deleteDoc, query, orderBy, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js';

        const firebaseConfig = {
            apiKey: "AIzaSyA5gtr-dyzd_nrW7Qn8mID_866lm1djGas",
            authDomain: "books-cosmin.firebaseapp.com",
            projectId: "books-cosmin",
            storageBucket: "books-cosmin.appspot.com",
            messagingSenderId: "437758651461",
            appId: "1:437758651461:web:a6b4e31b2b6ddc5baf472c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        window._fb = { 
            auth, db, storage, provider, signInWithPopup, signOut, onAuthStateChanged, 
            doc, setDoc, getDoc, collection, getDocs, deleteDoc, query, orderBy, onSnapshot,
            ref, uploadBytes, getDownloadURL, deleteObject 
        };
    </script>

    <style>
        :root {
            --bg: #f7f2e8; --text: #2a1f0e; --accent: #8b5e2a; --accent2: #c4945a;
            --muted: #9a8a72; --surface: rgba(247,242,232,0.95); --border: rgba(139,94,42,0.15);
            --shadow: rgba(42,31,14,0.15); --font-body: 'Crimson Pro', serif; --font-display: 'Cormorant Garamond', serif;
        }
        body.theme-dark { --bg:#141210; --text:#d4c8b0; --surface:rgba(20,18,16,0.97); --border:rgba(196,148,90,0.2); }
        
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { height: 100vh; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-body); transition: 0.5s; }

        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; background: var(--bg); transition: 0.4s; }
        .hidden { opacity: 0; pointer-events: none; transform: translateY(12px); }

        /* Library UI */
        .lib-top { display: flex; align-items: center; justify-content: space-between; padding: 28px; }
        .lib-brand { font-family: var(--font-display); font-size: 13px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); }
        .lib-heading { padding: 0 28px 20px; }
        .lib-heading h1 { font-family: var(--font-display); font-size: 42px; font-weight: 300; }
        .lib-heading h1 em { color: var(--accent); font-style: italic; }
        
        .lib-toolbar { padding: 0 28px 20px; display: flex; gap: 10px; }
        .btn-add { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-family: inherit; }
        
        .lib-grid { flex: 1; overflow-y: auto; padding: 0 28px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px; }
        .book-card { cursor: pointer; position: relative; }
        .book-spine { aspect-ratio: 2/3; background: var(--accent2); border-radius: 4px; box-shadow: 5px 5px 15px var(--shadow); display: flex; align-items: flex-end; padding: 10px; overflow: hidden; position: relative; }
        .book-spine-title { font-family: var(--font-display); font-size: 12px; color: white; z-index: 2; }
        .book-pct-bar { position: absolute; bottom: 0; left: 0; height: 4px; background: #fff; opacity: 0.8; }
        .btn-del { position: absolute; top: -5px; right: -5px; background: #ff4444; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; font-size: 12px; cursor: pointer; z-index: 10; }

        /* Reader UI */
        .reader-hud { position: fixed; top: 0; width: 100%; height: 50px; background: var(--surface); display: flex; align-items: center; justify-content: space-between; padding: 0 15px; z-index: 100; border-bottom: 1px solid var(--border); transition: 0.3s; }
        .reader-hud.hide { transform: translateY(-100%); }
        #epub-viewer, #pdf-viewer { flex: 1; margin-top: 50px; }
        .btn-back { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 16px; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 16px; border-radius: 20px; font-size: 14px; opacity: 0; transition: 0.3s; z-index: 1000; pointer-events: none; }
        .toast.show { opacity: 1; }

        /* User Area */
        .user-chip { display: flex; align-items: center; gap: 8px; background: none; border: 1px solid var(--border); padding: 5px 12px; border-radius: 15px; cursor: pointer; }
        .user-img { width: 24px; height: 24px; border-radius: 50%; }
    </style>
</head>
<body>

    <!-- BIBLIOTECA -->
    <div id="screen-library" class="screen">
        <div class="lib-top">
            <div class="lib-brand">DOBY BOOKS</div>
            <div id="user-area">
                <button class="user-chip" onclick="login()">Conectare Google</button>
            </div>
        </div>
        <div class="lib-heading"><h1>Biblioteca <em>ta Cloud</em></h1></div>
        <div class="lib-toolbar">
            <button class="btn-add" onclick="document.getElementById('file-input').click()">+ Adaugă Carte</button>
        </div>
        <div class="lib-grid" id="lib-grid"></div>
    </div>

    <!-- CITITOR -->
    <div id="screen-reader" class="screen hidden">
        <div class="reader-hud" id="hud">
            <button class="btn-back" onclick="closeBook()">← Înapoi</button>
            <div id="reader-title" style="font-style: italic; font-size: 14px; opacity: 0.7;">Titlu Carte</div>
            <div id="reader-pct" style="font-size: 12px;">0%</div>
        </div>
        <div id="epub-viewer"></div>
        <div id="pdf-viewer" style="overflow-y: auto; display: none;"></div>
    </div>

    <div class="toast" id="toast">Mesaj...</div>
    <input type="file" id="file-input" accept=".epub,.pdf" hidden onchange="handleFileUpload(event)">

    <script>
        const S = { user: null, books: [], currentBook: null, rendition: null };

        // 1. INITIALIZARE SI LOGIN
        window.addEventListener('DOMContentLoaded', () => {
            const checkAuth = setInterval(() => {
                if (window._fb) {
                    clearInterval(checkAuth);
                    window._fb.onAuthStateChanged(window._fb.auth, user => {
                        S.user = user;
                        updateUserUI();
                        if (user) listenToBooks();
                    });
                }
            }, 500);
        });

        async function login() {
            try { await window._fb.signInWithPopup(window._fb.auth, window._fb.provider); } 
            catch(e) { showToast("Eroare la logare"); }
        }

        function updateUserUI() {
            const area = document.getElementById('user-area');
            if (S.user) {
                area.innerHTML = `<button class="user-chip" onclick="window._fb.signOut(window._fb.auth)">
                    <img class="user-img" src="${S.user.photoURL}"> <span>Ieșire</span>
                </button>`;
            } else {
                area.innerHTML = `<button class="user-chip" onclick="login()">Conectare Google</button>`;
            }
        }

        // 2. SINCRONIZARE CLOUD (FIRESTORE)
        function listenToBooks() {
            const q = window._fb.query(window._fb.collection(window._fb.db, 'users', S.user.uid, 'books'), window._fb.orderBy('addedAt', 'desc'));
            window._fb.onSnapshot(q, snapshot => {
                S.books = snapshot.docs.map(doc => doc.data());
                renderLibrary();
            });
        }

        // 3. UPLOAD CARTE (STORAGE + FIRESTORE)
        async function handleFileUpload(e) {
            if (!S.user) return showToast("Loghează-te mai întâi!");
            const file = e.target.files[0];
            if (!file) return;

            const id = 'book_' + Date.now();
            const ext = file.name.split('.').pop().toLowerCase();
            const title = file.name.replace(/\.[^/.]+$/, "");

            showToast("Se urcă în Cloud...");

            try {
                const fileRef = window._fb.ref(window._fb.storage, `users/${S.user.uid}/books/${id}.${ext}`);
                await window._fb.uploadBytes(fileRef, file);
                const url = await window._fb.getDownloadURL(fileRef);

                await window._fb.setDoc(window._fb.doc(window._fb.db, 'users', S.user.uid, 'books', id), {
                    id, title, url, format: ext, progress: 0, addedAt: Date.now()
                });
                showToast("Gata! Disponibil pe toate dispozitivele.");
            } catch (err) { showToast("Eroare la upload"); }
        }

        // 4. RENDER BIBLIOTECA
        function renderLibrary() {
            const grid = document.getElementById('lib-grid');
            grid.innerHTML = S.books.map(b => `
                <div class="book-card">
                    <button class="btn-del" onclick="deleteBook('${b.id}', '${b.format}', event)">✕</button>
                    <div class="book-spine" onclick="openBook('${b.id}')">
                        <span class="book-spine-title">${b.title}</span>
                        <div class="book-pct-bar" style="width: ${(b.progress || 0) * 100}%"></div>
                    </div>
                </div>
            `).join('');
        }

        async function deleteBook(id, ext, e) {
            e.stopPropagation();
            if (!confirm("Ștergi definitiv cartea?")) return;
            await window._fb.deleteDoc(window._fb.doc(window._fb.db, 'users', S.user.uid, 'books', id));
            await window._fb.deleteObject(window._fb.ref(window._fb.storage, `users/${S.user.uid}/books/${id}.${ext}`));
            showToast("Ștearsă.");
        }

        // 5. DESCHIDERE SI LECTURA
        async function openBook(id) {
            const book = S.books.find(b => b.id === id);
            S.currentBook = book;
            document.getElementById('screen-library').classList.add('hidden');
            document.getElementById('screen-reader').classList.remove('hidden');
            document.getElementById('reader-title').textContent = book.title;

            if (book.format === 'epub') {
                renderEpub(book);
            } else {
                renderPdf(book);
            }
        }

        function renderEpub(book) {
            const viewer = document.getElementById('epub-viewer');
            viewer.innerHTML = "";
            viewer.style.display = "block";
            document.getElementById('pdf-viewer').style.display = "none";

            const epub = ePub(book.url);
            const rendition = epub.renderTo("epub-viewer", { width: "100%", height: "100%", flow: "paginated" });
            S.rendition = rendition;

            rendition.display(book.cfi || undefined);

            rendition.on("relocated", location => {
                const pct = epub.locations.percentageFromCfi(location.start.cfi);
                updateProgress(pct, location.start.cfi);
            });

            epub.ready.then(() => epub.locations.generate(1000));
        }

        function renderPdf(book) {
            const viewer = document.getElementById('pdf-viewer');
            viewer.style.display = "block";
            document.getElementById('epub-viewer').style.display = "none";
            viewer.innerHTML = `<iframe src="${book.url}" style="width:100%; height:100vh; border:none;"></iframe>`;
        }

        async function updateProgress(pct, cfi = null) {
            if (!S.currentBook) return;
            const progress = isNaN(pct) ? 0 : pct;
            document.getElementById('reader-pct').textContent = Math.round(progress * 100) + "%";
            
            await window._fb.setDoc(window._fb.doc(window._fb.db, 'users', S.user.uid, 'books', S.currentBook.id), {
                progress: progress,
                cfi: cfi,
                updatedAt: Date.now()
            }, { merge: true });
        }

        function closeBook() {
            document.getElementById('screen-reader').classList.add('hidden');
            document.getElementById('screen-library').classList.remove('hidden');
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.textContent = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
