<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Doby Books Premium</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, collection, query, orderBy, onSnapshot, deleteDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
        import { getStorage, ref, uploadBytes, getDownloadURL, deleteObject } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js';

        const firebaseConfig = {
            apiKey: "AIzaSyA5gtr-dyzd_nrW7Qn8mID_866lm1djGas",
            authDomain: "books-cosmin.firebaseapp.com",
            projectId: "books-cosmin",
            storageBucket: "books-cosmin.appspot.com",
            messagingSenderId: "437758651461",
            appId: "1:437758651461:web:a6b4e31b2b6ddc5baf472c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        const provider = new GoogleAuthProvider();

        window._fb = { auth, db, storage, provider, signInWithPopup, signOut, onAuthStateChanged, doc, setDoc, getDoc, collection, query, orderBy, onSnapshot, deleteDoc, updateDoc, ref, uploadBytes, getDownloadURL, deleteObject };
    </script>

    <style>
        :root {
            --bg: #f4ecd8; --text: #2c241a; --accent: #8b5e2a; --surface: #ffffff;
            --border: rgba(139,94,42,0.15); --shadow: rgba(0,0,0,0.1);
        }

        /* TEME MOONREADER */
        body.theme-sepia { --bg: #f4ecd8; --text: #433422; }
        body.theme-dark { --bg: #1a1a1a; --text: #d1d1d1; --surface: #252525; }
        body.theme-cardboard { --bg: #eaddca; --text: #3d2b1f; }
        body.theme-night { --bg: #000000; --text: #00ff00; } /* Matrix/Night Style */

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'Crimson Pro', serif; transition: 0.3s; }

        /* UI BIBLIOTECA */
        .header { padding: 20px; max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 1.2rem; color: var(--accent); letter-spacing: 2px; }
        
        .filter-bar { padding: 0 20px; max-width: 1200px; margin: 0 auto 20px; display: flex; gap: 10px; overflow-x: auto; }
        .filter-btn { padding: 6px 15px; border-radius: 15px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer; white-space: nowrap; }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .lib-grid { padding: 0 20px 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; }
        
        .book-card { cursor: pointer; position: relative; transition: 0.3s; }
        .book-card:hover { transform: translateY(-8px); }
        
        .cover-wrapper { 
            aspect-ratio: 2/3; background: #ddd; border-radius: 8px; overflow: hidden; 
            box-shadow: 0 10px 20px var(--shadow); position: relative;
            background-size: cover; background-position: center;
        }
        
        /* CERC PROGRES MARE */
        .progress-badge { 
            position: absolute; bottom: 10px; right: 10px; 
            width: 45px; height: 45px; background: rgba(0,0,0,0.7); 
            border: 2px solid var(--accent); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            color: white; font-weight: 600; font-size: 12px; z-index: 5;
        }

        .book-info { margin-top: 10px; }
        .book-info h3 { font-size: 14px; font-family: 'Cormorant Garamond', serif; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* CITITOR */
        #screen-reader { position: fixed; inset: 0; z-index: 1000; background: var(--bg); display: none; flex-direction: column; }
        .reader-hud { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); }
        
        #viewer-container { flex: 1; position: relative; overflow: hidden; }
        /* Zone de tap pentru Android */
        .tap-zone { position: absolute; top: 0; bottom: 0; width: 25%; z-index: 100; }
        .tap-left { left: 0; }
        .tap-right { right: 0; }

        /* BUTON DELETE */
        .del-btn { position: absolute; top: -10px; left: -10px; background: #ff4444; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; font-size: 12px; }

        .btn-add-main { display: block; width: fit-content; margin: 0 auto 30px; background: var(--accent); color: white; padding: 12px 30px; border-radius: 30px; text-decoration: none; font-weight: 600; cursor: pointer; border: none; }
    </style>
</head>
<body class="theme-sepia">

    <div id="screen-library">
        <div class="header">
            <div class="logo">DOBY BOOKS</div>
            <div id="user-area"><button onclick="login()" class="filter-btn">Conectare</button></div>
        </div>

        <button class="btn-add-main" onclick="document.getElementById('file-input').click()">+ ADAUGĂ O CARTE</button>

        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterBooks('all', this)">Toate</button>
            <button class="filter-btn" onclick="filterBooks('reading', this)">În lucru</button>
            <button class="filter-btn" onclick="filterBooks('finished', this)">Finalizate</button>
        </div>

        <div class="lib-grid" id="lib-grid">
            <!-- Cartile apar aici -->
        </div>
    </div>

    <!-- ECRAN CITITOR -->
    <div id="screen-reader">
        <div class="reader-hud">
            <button onclick="closeBook()" class="filter-btn">← Înapoi</button>
            <div id="reader-pct">0%</div>
            <select onchange="changeTheme(this.value)" class="filter-btn">
                <option value="theme-sepia">Sepia</option>
                <option value="theme-dark">Dark</option>
                <option value="theme-cardboard">Hârtie</option>
                <option value="theme-night">Noapte</option>
            </select>
        </div>
        <div id="viewer-container">
            <div class="tap-zone tap-left" onclick="prevPage()"></div>
            <div class="tap-zone tap-right" onclick="nextPage()"></div>
            <div id="viewer" style="height: 100%;"></div>
        </div>
    </div>

    <input type="file" id="file-input" accept=".epub,.pdf" hidden onchange="uploadFile(event)">
    <div id="toast" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:white; padding:10px 20px; border-radius:20px; display:none; z-index:2000;"></div>

    <script>
        let S = { user: null, books: [], currentBook: null, rendition: null, filter: 'all' };

        // INITIALIZARE
        window.addEventListener('DOMContentLoaded', () => {
            const check = setInterval(() => {
                if (window._fb) {
                    clearInterval(check);
                    window._fb.onAuthStateChanged(window._fb.auth, user => {
                        S.user = user;
                        if (user) {
                            document.getElementById('user-area').innerHTML = `<img src="${user.photoURL}" style="width:30px; border-radius:50%; cursor:pointer;" onclick="window._fb.signOut(window._fb.auth)">`;
                            listenBooks();
                        }
                    });
                }
            }, 500);
        });

        async function login() { await window._fb.signInWithPopup(window._fb.auth, window._fb.provider); }

        function listenBooks() {
            const q = window._fb.query(window._fb.collection(window._fb.db, 'users', S.user.uid, 'books'), window._fb.orderBy('addedAt', 'desc'));
            window._fb.onSnapshot(q, snap => {
                S.books = snap.docs.map(d => d.data());
                renderLibrary();
            });
        }

        // UPLOAD & COPERTA
        async function uploadFile(e) {
            const file = e.target.files[0];
            if (!file || !S.user) return;
            const id = 'book_' + Date.now();
            const ext = file.name.split('.').pop().toLowerCase();
            
            msg("Se extrage metadatele...");
            let coverUrl = "";
            
            // Daca e EPUB, incercam sa scoatem coperta
            if (ext === 'epub') {
                const book = ePub(await file.arrayBuffer());
                coverUrl = await book.coverUrl();
            }

            msg("Se urcă în Cloud...");
            const ref = window._fb.ref(window._fb.storage, `users/${S.user.uid}/books/${id}.${ext}`);
            await window._fb.uploadBytes(ref, file);
            const url = await window._fb.getDownloadURL(ref);

            await window._fb.setDoc(window._fb.doc(window._fb.db, 'users', S.user.uid, 'books', id), {
                id, title: file.name.replace(/\.[^/.]+$/, ""), url, cover: coverUrl || "", format: ext, progress: 0, addedAt: Date.now()
            });
            msg("Gata!");
        }

        function renderLibrary() {
            const grid = document.getElementById('lib-grid');
            let filtered = S.books;
            if (S.filter === 'reading') filtered = S.books.filter(b => b.progress > 0 && b.progress < 0.98);
            if (S.filter === 'finished') filtered = S.books.filter(b => b.progress >= 0.98);

            grid.innerHTML = filtered.map(b => `
                <div class="book-card" onclick="openBook('${b.id}')">
                    <button class="del-btn" onclick="deleteBook('${b.id}', '${b.format}', event)">✕</button>
                    <div class="cover-wrapper" style="background-image: url('${b.cover || 'https://via.placeholder.com/150x225?text=Fara+Coperta'}')">
                        <div class="progress-badge">${Math.round((b.progress || 0) * 100)}%</div>
                    </div>
                    <div class="book-info">
                        <h3>${b.title}</h3>
                    </div>
                </div>
            `).join('');
        }

        async function openBook(id) {
            const book = S.books.find(b => b.id === id);
            S.currentBook = book;
            document.getElementById('screen-library').style.display = 'none';
            document.getElementById('screen-reader').style.display = 'flex';

            if (book.format === 'epub') {
                const epub = ePub(book.url);
                S.rendition = epub.renderTo("viewer", { width: "100%", height: "100%", flow: "paginated", manager: "default" });
                S.rendition.display(book.cfi || undefined);
                
                S.rendition.on("relocated", loc => {
                    const pct = epub.locations.percentageFromCfi(loc.start.cfi);
                    saveProg(pct, loc.start.cfi);
                });
                epub.ready.then(() => epub.locations.generate(1000));
            } else {
                document.getElementById('viewer').innerHTML = `<iframe src="${book.url}" style="width:100%; height:100%; border:none;"></iframe>`;
            }
        }

        function prevPage() { if(S.rendition) S.rendition.prev(); }
        function nextPage() { if(S.rendition) S.rendition.next(); }

        async function saveProg(p, cfi) {
            if (!S.currentBook || isNaN(p)) return;
            document.getElementById('reader-pct').textContent = Math.round(p * 100) + "%";
            await window._fb.updateDoc(window._fb.doc(window._fb.db, 'users', S.user.uid, 'books', S.currentBook.id), { progress: p, cfi: cfi });
        }

        function changeTheme(t) {
            document.body.className = t;
            // Daca e EPUB, trebuie sa injectam stilul in iframe
            if (S.rendition) {
                const color = getComputedStyle(document.body).getPropertyValue('--text');
                S.rendition.themes.default({ body: { color: color + " !important" } });
            }
        }

        function filterBooks(f, btn) {
            S.filter = f;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderLibrary();
        }

        function closeBook() {
            if (S.rendition) S.rendition.destroy();
            document.getElementById('screen-reader').style.display = 'none';
            document.getElementById('screen-library').style.display = 'block';
        }

        async function deleteBook(id, ext, e) {
            e.stopPropagation();
            if (!confirm("Stergi?")) return;
            await window._fb.deleteDoc(window._fb.doc(window._fb.db, 'users', S.user.uid, 'books', id));
            await window._fb.deleteObject(window._fb.ref(window._fb.storage, `users/${S.user.uid}/books/${id}.${ext}`));
        }

        function msg(m) {
            const t = document.getElementById('toast');
            t.textContent = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
