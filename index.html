<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Doby Books - Stabil</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
        import { getFirestore, doc, setDoc, collection, query, orderBy, onSnapshot, updateDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';
        import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js';

        const firebaseConfig = {
            apiKey: "AIzaSyA5gtr-dyzd_nrW7Qn8mID_866lm1djGas",
            authDomain: "books-cosmin.firebaseapp.com",
            projectId: "books-cosmin",
            storageBucket: "books-cosmin.appspot.com",
            messagingSenderId: "437758651461",
            appId: "1:437758651461:web:a6b4e31b2b6ddc5baf472c"
        };

        const app = initializeApp(firebaseConfig);
        window._fb = { 
            auth: getAuth(app), db: getFirestore(app), storage: getStorage(app), provider: new GoogleAuthProvider(),
            signInWithPopup, onAuthStateChanged, doc, setDoc, collection, query, orderBy, onSnapshot, updateDoc, ref, uploadBytes, getDownloadURL 
        };
    </script>

    <style>
        :root { --bg: #f4ecd8; --text: #2c241a; --accent: #8b5e2a; }
        body { margin: 0; background: var(--bg); font-family: sans-serif; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; }
        .card { background: #e8dfcc; padding: 10px; border-radius: 8px; cursor: pointer; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* CITITOR - PRIORITATE MAXIMA */
        #reader { position: fixed; inset: 0; z-index: 9999; background: var(--bg); display: none; flex-direction: column; }
        #viewer { flex: 1; width: 100%; height: 100%; }
        .nav-bar { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .controls { padding: 15px; display: flex; justify-content: center; gap: 20px; border-top: 1px solid rgba(0,0,0,0.1); }
        button { padding: 10px 20px; cursor: pointer; background: var(--accent); color: white; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="library" class="container">
        <h2 style="color: var(--accent);">Doby Books</h2>
        <div id="auth-zone"></div>
        <button onclick="document.getElementById('file-in').click()" style="margin: 20px 0;">+ ADAUGĂ EPUB</button>
        <div class="grid" id="book-grid"></div>
    </div>

    <div id="reader">
        <div class="nav-bar">
            <button onclick="closeReader()">← ÎNAPOI</button>
            <div id="pct">0%</div>
        </div>
        <div id="viewer"></div>
        <div class="controls">
            <button onclick="prev()">ÎNAPOI</button>
            <button onclick="next()">ÎNAINTE</button>
        </div>
    </div>

    <input type="file" id="file-in" accept=".epub" hidden onchange="upload(event)">

    <script>
        let S = { user: null, books: [], rendition: null, currentBook: null };

        window.addEventListener('DOMContentLoaded', () => {
            const checkFB = setInterval(() => {
                if (window._fb) {
                    clearInterval(checkFB);
                    window._fb.onAuthStateChanged(window._fb.auth, user => {
                        S.user = user;
                        if (user) {
                            document.getElementById('auth-zone').innerHTML = `Salut, ${user.displayName}`;
                            loadBooks();
                        } else {
                            document.getElementById('auth-zone').innerHTML = `<button onclick="window._fb.signInWithPopup(window._fb.auth, window._fb.provider)">Login cu Google</button>`;
                        }
                    });
                }
            }, 500);
        });

        async function upload(e) {
            const file = e.target.files[0];
            if (!file || !S.user) return;
            const id = 'b' + Date.now();
            const sRef = window._fb.ref(window._fb.storage, `books/${S.user.uid}/${id}.epub`);
            await window._fb.uploadBytes(sRef, file);
            const url = await window._fb.getDownloadURL(sRef);
            await window._fb.setDoc(window._fb.doc(window._fb.db, 'users', S.user.uid, 'books', id), {
                id, title: file.name, url, progress: 0, addedAt: Date.now()
            });
        }

        function loadBooks() {
            const q = window._fb.query(window._fb.collection(window._fb.db, 'users', S.user.uid, 'books'), window._fb.orderBy('addedAt', 'desc'));
            window._fb.onSnapshot(q, snap => {
                S.books = snap.docs.map(d => d.data());
                document.getElementById('book-grid').innerHTML = S.books.map(b => `
                    <div class="card" onclick="openBook('${b.id}')">
                        <div style="height: 100px; display: flex; align-items: center; justify-content: center;">📖</div>
                        <div style="font-size: 12px; font-weight: bold;">${b.title}</div>
                        <div style="color: var(--accent);">${Math.round(b.progress * 100)}%</div>
                    </div>
                `).join('');
            });
        }

        async function openBook(id) {
            const book = S.books.find(b => b.id === id);
            S.currentBook = book;
            document.getElementById('reader').style.display = 'flex';
            
            // Initializare EPUB
            const epub = ePub(book.url);
            S.rendition = epub.renderTo("viewer", { width: "100%", height: "100%", flow: "paginated" });
            
            // Afisare pagina salvata sau inceputul
            await S.rendition.display(book.cfi || undefined);

            // Salvare progres
            S.rendition.on("relocated", loc => {
                const p = epub.locations.percentageFromCfi(loc.start.cfi);
                document.getElementById('pct').textContent = Math.round(p * 100) + "%";
                window._fb.updateDoc(window._fb.doc(window._fb.db, 'users', S.user.uid, 'books', id), { 
                    progress: p || 0, 
                    cfi: loc.start.cfi 
                });
            });

            epub.ready.then(() => epub.locations.generate(1024));
        }

        function prev() { if(S.rendition) S.rendition.prev(); }
        function next() { if(S.rendition) S.rendition.next(); }
        function closeReader() {
            if(S.rendition) S.rendition.destroy();
            document.getElementById('reader').style.display = 'none';
        }
    </script>
</body>
</html>
