<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1410">
<title>Lectură</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
  import { getFirestore, doc, setDoc, getDoc, collection, getDocs, deleteDoc }
    from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyA5gtr-dyzd_nrW7Qn8mID_866lm1djGas",
    authDomain: "books-cosmin.firebaseapp.com",
    projectId: "books-cosmin",
    storageBucket: "books-cosmin.firebasestorage.app",
    messagingSenderId: "437758651461",
    appId: "1:437758651461:web:a6b4e31b2b6ddc5baf472c"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  window._fb = { auth, db, provider, signInWithPopup, signOut, onAuthStateChanged, doc, setDoc, getDoc, collection, getDocs, deleteDoc };
</script>

<style>
:root {
  --bg: #f7f2e8;
  --text: #2a1f0e;
  --accent: #8b5e2a;
  --accent2: #c4945a;
  --muted: #9a8a72;
  --surface: rgba(247,242,232,0.95);
  --border: rgba(139,94,42,0.15);
  --shadow: rgba(42,31,14,0.15);
  --font-body: 'Crimson Pro', Georgia, serif;
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-size: 20px;
  --line-height: 1.8;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; height: 100dvh;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
}

.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  background: var(--bg);
}
.screen.hidden { opacity: 0; pointer-events: none; }

.lib-top { display: flex; align-items: center; justify-content: space-between; padding: 28px; }
.lib-brand { font-family: var(--font-display); font-size: 13px; text-transform: uppercase; color: var(--accent); letter-spacing: 0.2em; }

.btn-add { background: var(--accent); color: #fff; border: none; border-radius: 24px; padding: 10px 20px; cursor: pointer; font-family: inherit; }

.lib-grid { flex: 1; overflow-y: auto; padding: 28px; display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 24px; }
.book-card { cursor: pointer; display: flex; flex-direction: column; gap: 8px; }
.book-spine { aspect-ratio: 2/3; background: linear-gradient(160deg, var(--accent), var(--accent2)); border-radius: 4px; box-shadow: 4px 6px 12px var(--shadow); display: flex; align-items: flex-end; padding: 10px; }
.book-spine-title { font-family: var(--font-display); font-size: 11px; color: white; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }

#screen-reader { display: none; }
#screen-reader.active { display: flex; }

.reader-hud { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; background: var(--surface); border-bottom: 1px solid var(--border); }
#epub-viewer { flex: 1; overflow: hidden; }

.tap-zone { position: fixed; top: 44px; bottom: 0; width: 25%; z-index: 50; cursor: pointer; }
#tap-prev { left: 0; } #tap-next { right: 0; }

#loader { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; transition: opacity 0.3s; }
#loader.done { opacity: 0; pointer-events: none; }

#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 8px 16px; border-radius: 20px; display: none; }
</style>
</head>
<body>

<div id="screen-library" class="screen">
  <div class="lib-top">
    <div class="lib-brand">Lectură</div>
    <div id="user-area"><button onclick="loginGoogle()" class="btn-add">Conectare</button></div>
  </div>
  <div style="padding: 0 28px;"><h1>Biblioteca ta</h1></div>
  <div style="padding: 20px 28px;"><button class="btn-add" id="btn-upload">Adaugă carte</button></div>
  <div class="lib-grid" id="lib-grid"></div>
</div>

<div id="screen-reader" class="screen">
  <div class="reader-hud">
    <button onclick="closeReader()" style="background:none; border:none; color:var(--accent); cursor:pointer;">← Bibliotecă</button>
    <div id="hud-title" style="font-size:12px; font-style:italic; opacity:0.7;"></div>
    <div id="hud-pct" style="font-weight:bold; color:var(--accent);">0%</div>
  </div>
  <div id="epub-viewer"></div>
  <div id="tap-prev" class="tap-zone" onclick="readerPrev()"></div>
  <div id="tap-next" class="tap-zone" onclick="readerNext()"></div>
</div>

<div id="loader">Se încarcă...</div>
<div id="toast"></div>
<input type="file" id="file-input" accept=".epub" hidden>

<script>
const S = {
  books: [],
  currentBook: null,
  epubBook: null,
  rendition: null,
  user: null
};

window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('loader').classList.add('done');
  loadBooksLocal();
  renderLibrary();
  initAuth();
});

function initAuth() {
  const check = setInterval(() => {
    if (window._fb) {
      clearInterval(check);
      window._fb.onAuthStateChanged(window._fb.auth, user => {
        S.user = user;
        if (user) {
          document.getElementById('user-area').innerHTML = `<span style="font-size:12px; color:var(--muted)">${user.displayName}</span>`;
          syncFromCloud();
        }
      });
    }
  }, 500);
}

async function loginGoogle() {
  await window._fb.signInWithPopup(window._fb.auth, window._fb.provider);
}

function loadBooksLocal() {
  const raw = localStorage.getItem('lecturaBooks');
  if (raw) S.books = JSON.parse(raw);
}

function saveBooksLocal() {
  const meta = S.books.map(b => ({ id: b.id, title: b.title, progress: b.progress || 0, bookmark: b.bookmark || null, addedAt: b.addedAt }));
  localStorage.setItem('lecturaBooks', JSON.stringify(meta));
}

function renderLibrary() {
  const grid = document.getElementById('lib-grid');
  grid.innerHTML = S.books.map(b => `
    <div class="book-card" onclick="openBook('${b.id}')">
      <div class="book-spine">
        <span class="book-spine-title">${b.title}</span>
      </div>
      <div style="font-size:12px; font-weight:bold;">${Math.round((b.progress || 0) * 100)}% citit</div>
    </div>
  `).join('');
}

document.getElementById('btn-upload').onclick = () => document.getElementById('file-input').click();
document.getElementById('file-input').onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const buffer = await file.arrayBuffer();
  const id = 'book_' + Date.now();
  await idbSet(id, buffer);
  S.books.push({ id, title: file.name.replace('.epub',''), progress: 0, addedAt: Date.now() });
  saveBooksLocal();
  renderLibrary();
};

async function openBook(id) {
  const book = S.books.find(b => b.id === id);
  const buffer = await idbGet(id);
  if (!buffer) return alert("Fișier negăsit local.");

  S.currentBook = book;
  document.getElementById('screen-library').classList.add('hidden');
  document.getElementById('screen-reader').classList.add('active');
  document.getElementById('hud-title').textContent = book.title;

  if (S.epubBook) S.epubBook.destroy();
  S.epubBook = ePub(buffer);
  S.rendition = S.epubBook.renderTo("epub-viewer", { width: "100%", height: "100%", flow: "paginated" });
  
  await S.rendition.display(book.bookmark || undefined);

  // REPARARE PROGRES: Folosim o metodă mai rapidă
  S.epubBook.ready.then(() => {
    return S.epubBook.locations.generate(100); // Mai puține locații pentru viteză
  }).then(() => {
    updateProgressLabel();
  });

  S.rendition.on("relocated", location => {
    const cfi = location.start.cfi;
    const pct = S.epubBook.locations.percentageFromCfi(cfi);
    S.currentBook.progress = pct;
    S.currentBook.bookmark = cfi;
    updateProgressLabel();
    saveBooksLocal();
    renderLibrary();
    syncToCloud(id);
  });
}

function updateProgressLabel() {
  if (!S.rendition || !S.epubBook) return;
  const loc = S.rendition.currentLocation();
  if (loc && loc.start) {
    const pct = S.epubBook.locations.percentageFromCfi(loc.start.cfi);
    document.getElementById('hud-pct').textContent = Math.round(pct * 100) + "%";
  }
}

function readerPrev() { if (S.rendition) S.rendition.prev(); }
function readerNext() { if (S.rendition) S.rendition.next(); }

function closeReader() {
  document.getElementById('screen-library').classList.remove('hidden');
  document.getElementById('screen-reader').classList.remove('active');
}

// IndexedDB Utils
async function idbOpen() {
  return new Promise((res) => {
    const req = indexedDB.open('LecturaDB', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('files');
    req.onsuccess = e => res(e.target.result);
  });
}
async function idbSet(k, v) {
  const db = await idbOpen();
  const tx = db.transaction('files','readwrite');
  tx.objectStore('files').put(v, k);
}
async function idbGet(k) {
  const db = await idbOpen();
  return new Promise(res => {
    const req = db.transaction('files').objectStore('files').get(k);
    req.onsuccess = () => res(req.result);
  });
}

async function syncToCloud(id) {
  if (!S.user || !window._fb) return;
  const b = S.books.find(x => x.id === id);
  await window._fb.setDoc(window._fb.doc(window._fb.db, 'users', S.user.uid, 'books', id), {
    id: b.id, title: b.title, progress: b.progress, bookmark: b.bookmark, updatedAt: Date.now()
  });
}

async function syncFromCloud() {
  if (!S.user || !window._fb) return;
  const snap = await window._fb.getDocs(window._fb.collection(window._fb.db, 'users', S.user.uid, 'books'));
  snap.forEach(docSnap => {
    const cloud = docSnap.data();
    const local = S.books.find(x => x.id === cloud.id);
    if (local && cloud.updatedAt > (local.updatedAt || 0)) {
      local.progress = cloud.progress;
      local.bookmark = cloud.bookmark;
    }
  });
  renderLibrary();
}
</script>
</body>
</html>
