<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1410">
<title>Lectură</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=Lora:ital,wght@0,400;1,400&family=Merriweather:ital,wght@0,300;0,400;1,300&family=Source+Serif+4:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/epubjs@0.3.93/dist/epub.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --bg:#f7f2e8; --text:#2a1f0e; --accent:#8b5e2a; --accent2:#c4945a;
  --muted:#9a8a72; --surface:rgba(247,242,232,0.96); --border:rgba(139,94,42,0.15);
  --shadow:rgba(42,31,14,0.15);
  --font-body:'Crimson Pro',Georgia,serif;
  --font-display:'Cormorant Garamond',Georgia,serif;
}
body.t-sepia  { --bg:#f5ead0;--text:#3d2b0e;--surface:rgba(245,234,208,0.97); }
body.t-paper  { --bg:#fafaf7;--text:#1a1a1a;--accent:#555;--surface:rgba(250,250,247,0.97);--border:rgba(0,0,0,0.1); }
body.t-dark   { --bg:#141210;--text:#d4c8b0;--accent:#c4945a;--surface:rgba(20,18,16,0.97);--border:rgba(196,148,90,0.2);--shadow:rgba(0,0,0,0.4); }
body.t-night  { --bg:#0d0f14;--text:#8faabf;--accent:#5a8ab4;--surface:rgba(13,15,20,0.97);--border:rgba(90,138,180,0.2); }
body.t-green  { --bg:#f0f4ee;--text:#1a2e1a;--accent:#4a7c59;--accent2:#6ba57a;--muted:#7a9a7a;--surface:rgba(240,244,238,0.97);--border:rgba(74,124,89,0.18); }
body.t-blue   { --bg:#eef2f7;--text:#1a2535;--accent:#3a6ea8;--accent2:#5a8ec8;--muted:#7a90a8;--surface:rgba(238,242,247,0.97);--border:rgba(58,110,168,0.18); }
body.t-warm   { --bg:#2d1f14;--text:#e8d5b0;--accent:#d4956a;--accent2:#e8b48a;--muted:#a08060;--surface:rgba(45,31,20,0.97);--border:rgba(212,149,106,0.2);--shadow:rgba(0,0,0,0.5); }
body.t-mocha  { --bg:#1e1a18;--text:#d0c4b0;--accent:#b8956a;--accent2:#d4b080;--muted:#8a7860;--surface:rgba(30,26,24,0.97);--border:rgba(184,149,106,0.2);--shadow:rgba(0,0,0,0.5); }

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-body);transition:background .5s,color .5s;}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);transition:opacity .35s,transform .35s;}
.screen.hidden{opacity:0;pointer-events:none;transform:translateY(10px);}

/* ── LIBRARY ── */
#screen-library{padding-top:env(safe-area-inset-top,0px);}
.lib-top{display:flex;align-items:center;justify-content:space-between;padding:24px 24px 0;flex-shrink:0;}
.lib-brand{font-family:var(--font-display);font-size:13px;font-weight:300;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);opacity:.7;}
.lib-actions{display:flex;gap:8px;align-items:center;}
.btn-icon{width:36px;height:36px;border:1px solid var(--border);background:transparent;border-radius:50%;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:15px;font-family:var(--font-body);}
.btn-icon:hover{color:var(--accent);border-color:var(--accent);}
.btn-icon:active{transform:scale(.93);}
.lib-heading{padding:18px 24px 4px;flex-shrink:0;}
.lib-heading h1{font-family:var(--font-display);font-size:clamp(30px,7vw,50px);font-weight:300;line-height:1.1;color:var(--text);}
.lib-heading h1 em{font-style:italic;color:var(--accent);}
.lib-toolbar{display:flex;gap:10px;padding:14px 24px;flex-shrink:0;}
.btn-add{display:flex;align-items:center;gap:7px;background:var(--accent);color:#fff;border:none;border-radius:22px;padding:10px 18px;font-family:var(--font-body);font-size:14px;cursor:pointer;transition:opacity .2s,transform .15s;white-space:nowrap;}
.btn-add:active{opacity:.85;transform:scale(.97);}
.btn-outline{display:flex;align-items:center;gap:6px;background:transparent;color:var(--accent);border:1px solid var(--border);border-radius:22px;padding:10px 14px;font-family:var(--font-body);font-size:14px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-outline:hover{border-color:var(--accent);}
.btn-outline:active{transform:scale(.97);}
.lib-grid{flex:1;overflow-y:auto;padding:4px 24px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:22px;align-content:start;-webkit-overflow-scrolling:touch;}
.lib-empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:12px;opacity:.4;text-align:center;}
.lib-empty-icon{font-size:48px;}
.lib-empty-text{font-family:var(--font-display);font-size:18px;font-style:italic;color:var(--muted);}

/* Book card */
.book-card{display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:transform .25s;position:relative;animation:fadeUp .4s both;}
.book-card:active{transform:scale(.94);}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.book-spine{width:100%;aspect-ratio:2/3;border-radius:3px 7px 7px 3px;box-shadow:-3px 2px 0 rgba(0,0,0,.08),5px 8px 22px var(--shadow);position:relative;overflow:hidden;display:flex;align-items:flex-end;padding:10px 10px 12px;}
.book-spine::before{content:'';position:absolute;left:0;top:0;bottom:0;width:8px;background:rgba(0,0,0,.18);border-radius:3px 0 0 3px;}
.book-spine::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 60%);}
.book-spine-title{font-family:var(--font-display);font-size:11px;color:rgba(255,255,255,.9);line-height:1.3;word-break:break-word;hyphens:auto;position:relative;z-index:1;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;}
.book-pct-ring{position:absolute;top:8px;right:8px;width:28px;height:28px;z-index:1;}
.book-meta{display:flex;flex-direction:column;gap:2px;}
.book-title-label{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.book-pct-label{font-size:11px;color:var(--muted);}
.book-del{position:absolute;top:6px;right:-4px;opacity:0;transition:opacity .2s;}
.book-card:hover .book-del{opacity:1;}
.book-del button{width:22px;height:22px;background:var(--surface);border:1px solid var(--border);border-radius:50%;color:var(--muted);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px var(--shadow);}

/* User chip */
.user-chip{display:flex;align-items:center;gap:7px;cursor:pointer;padding:5px 10px 5px 5px;border-radius:20px;border:1px solid var(--border);transition:all .2s;background:transparent;font-family:var(--font-body);color:var(--text);}
.user-chip:hover{border-color:var(--accent);}
.u-avatar{width:26px;height:26px;border-radius:50%;background:var(--accent);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.u-avatar img{width:100%;height:100%;object-fit:cover;}
.u-name{font-size:13px;color:var(--muted);max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── READER ── */
.reader-hud{position:fixed;top:0;left:0;right:0;height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;background:var(--surface);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);z-index:100;transition:transform .35s,opacity .35s;padding-top:env(safe-area-inset-top,0px);}
.reader-hud.hud-off{transform:translateY(-100%);opacity:0;}
.hud-left{display:flex;align-items:center;gap:8px;}
.hud-right{display:flex;align-items:center;gap:6px;}
.btn-back{background:none;border:none;color:var(--accent);font-size:18px;cursor:pointer;padding:4px 6px 4px 0;font-family:var(--font-body);display:flex;align-items:center;gap:5px;transition:opacity .2s;}
.btn-back span{font-size:13px;color:var(--muted);}
.btn-back:active{opacity:.6;}
.hud-title{font-family:var(--font-display);font-size:14px;font-weight:400;font-style:italic;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;}
.hud-pct{font-size:12px;color:var(--muted);letter-spacing:.08em;min-width:34px;text-align:right;}
.prog-wrap{position:fixed;top:44px;left:0;right:0;height:2px;background:var(--border);z-index:100;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s ease;width:0%;}
#epub-viewer{position:fixed;top:46px;left:0;right:0;bottom:44px;overflow:hidden;}
#epub-viewer iframe{width:100%;height:100%;border:none;}
#pdf-viewer{position:fixed;top:46px;left:0;right:0;bottom:44px;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:20px;gap:10px;-webkit-overflow-scrolling:touch;}
#pdf-viewer canvas{max-width:100%;box-shadow:0 4px 22px var(--shadow);border-radius:2px;display:block;}
.tap-zone{position:fixed;top:46px;bottom:44px;width:22%;cursor:pointer;z-index:50;}
#tap-prev{left:0;}
#tap-next{right:0;}
.reader-footer{position:fixed;bottom:0;left:0;right:0;height:44px;display:flex;align-items:center;justify-content:center;gap:4px;background:var(--surface);border-top:1px solid var(--border);backdrop-filter:blur(12px);z-index:100;padding-bottom:env(safe-area-inset-bottom,0px);transition:transform .35s,opacity .35s;}
.reader-footer.hud-off{transform:translateY(100%);opacity:0;}
.foot-btn{width:38px;height:38px;border:none;background:transparent;color:var(--muted);font-size:17px;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.foot-btn:hover{color:var(--accent);background:rgba(139,94,42,.08);}
.foot-btn:active{transform:scale(.9);}

/* PDF nav */
.pdf-nav{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:26px;padding:7px 14px;backdrop-filter:blur(12px);z-index:100;box-shadow:0 4px 18px var(--shadow);}
.pdf-nav button{width:32px;height:32px;background:transparent;border:none;color:var(--accent);font-size:18px;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s;}
.pdf-nav button:hover{background:rgba(139,94,42,.1);}
.pdf-page-info{font-size:13px;color:var(--muted);min-width:68px;text-align:center;}
.pdf-nav.hidden{display:none;}

/* ── PANELS ── */
.panel{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s;}
.panel.open{opacity:1;pointer-events:all;}
.panel-inner{width:100%;max-height:78dvh;background:var(--bg);border-radius:20px 20px 0 0;padding:12px 22px 32px;overflow-y:auto;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,1,.4,1);border-top:1px solid var(--border);}
.panel.open .panel-inner{transform:translateY(0);}
.panel-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}
.panel-title{font-family:var(--font-display);font-size:20px;font-weight:300;font-style:italic;color:var(--accent);margin-bottom:18px;}
.sg{margin-bottom:22px;}
.sg-label{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}

/* Themes */
.theme-grid{display:flex;gap:9px;flex-wrap:wrap;}
.tswatch{width:42px;height:42px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .2s;flex-shrink:0;}
.tswatch.active{border-color:var(--accent);transform:scale(1.12);}
.tswatch[data-t="default"]{background:#f7f2e8;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12);}
.tswatch[data-t="sepia"]  {background:#f5ead0;box-shadow:inset 0 0 0 1px rgba(0,0,0,.1);}
.tswatch[data-t="paper"]  {background:#fafaf7;box-shadow:inset 0 0 0 1px rgba(0,0,0,.1);}
.tswatch[data-t="dark"]   {background:#141210;}
.tswatch[data-t="night"]  {background:#0d0f14;}
.tswatch[data-t="green"]  {background:#f0f4ee;box-shadow:inset 0 0 0 1px rgba(74,124,89,.3);}
.tswatch[data-t="blue"]   {background:#eef2f7;box-shadow:inset 0 0 0 1px rgba(58,110,168,.25);}
.tswatch[data-t="warm"]   {background:#2d1f14;}
.tswatch[data-t="mocha"]  {background:#1e1a18;}

/* Font size */
.fsrow{display:flex;align-items:center;gap:12px;}
.fsrow button{width:42px;height:42px;border:1px solid var(--border);background:transparent;border-radius:50%;color:var(--text);font-size:18px;cursor:pointer;transition:all .2s;font-family:var(--font-display);}
.fsrow button:hover{border-color:var(--accent);color:var(--accent);}
.fsrow button:active{transform:scale(.92);}
.fsval{font-family:var(--font-display);font-size:20px;font-weight:300;color:var(--accent);min-width:46px;text-align:center;}

/* Fonts */
.font-list{display:flex;flex-direction:column;gap:7px;}
.font-opt{padding:10px 14px;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between;background:transparent;color:var(--text);width:100%;}
.font-opt.active{border-color:var(--accent);background:rgba(139,94,42,.06);}
.fo-name{font-size:15px;}
.fo-sample{font-size:12px;color:var(--muted);font-style:italic;}

/* Line height */
.lhrow{display:flex;gap:8px;}
.lhbtn{flex:1;padding:10px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text);font-size:13px;cursor:pointer;transition:all .2s;font-family:var(--font-body);}
.lhbtn.active{border-color:var(--accent);background:rgba(139,94,42,.08);color:var(--accent);}

/* Toast */
.toast{position:fixed;bottom:58px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:20px;font-size:13px;font-family:var(--font-body);opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Loader */
.loader{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;transition:opacity .4s;}
.loader.done{opacity:0;pointer-events:none;}
.loader-title{font-family:var(--font-display);font-size:22px;font-weight:300;font-style:italic;color:var(--accent);}
.dots{display:flex;gap:8px;}
.dots span{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:dot 1.2s infinite both;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes dot{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* Pull to refresh */
.ptr{position:fixed;top:0;left:0;right:0;height:0;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--surface);z-index:300;transition:height .2s;font-size:13px;color:var(--muted);gap:8px;font-family:var(--font-body);}
.ptr.show{height:52px;}
.ptr-spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
#file-input{display:none;}
</style>
</head>
<body>

<!-- PTR -->
<div class="ptr" id="ptr">
  <div class="ptr-spin"></div>
  <span id="ptr-txt">Trage pentru reîncărcare</span>
</div>

<!-- ── LIBRARY ── -->
<div id="screen-library" class="screen">
  <div class="lib-top">
    <div class="lib-brand">Lectură</div>
    <div class="lib-actions">
      <button class="btn-icon" onclick="toggleFullscreen()" title="Ecran complet">⛶</button>
      <div id="user-area">
        <button class="btn-icon" onclick="loginGoogle()" title="Conectare Google">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        </button>
      </div>
    </div>
  </div>
  <div class="lib-heading"><h1>Biblioteca<br><em>ta</em></h1></div>
  <div style="font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);padding:0 24px 0;flex-shrink:0;" id="lib-sub"></div>
  <div class="lib-toolbar">
    <button class="btn-add" onclick="document.getElementById('file-input').click()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
      Adaugă carte
    </button>
    <button class="btn-outline" onclick="dropboxPick()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L5 7.5 12 13l-7 5.5 7-5.5 7 5.5-7-5.5 7-5.5z"/></svg>
      Dropbox
    </button>
  </div>
  <div class="lib-grid" id="lib-grid">
    <div class="lib-empty">
      <div class="lib-empty-icon">📚</div>
      <div class="lib-empty-text">Nicio carte încă.<br>Adaugă prima ta carte.</div>
    </div>
  </div>
</div>

<!-- ── READER ── -->
<div id="screen-reader" class="screen hidden">
  <div class="reader-hud" id="reader-hud">
    <div class="hud-left">
      <button class="btn-back" id="btn-back">← <span>Bibliotecă</span></button>
      <div class="hud-title" id="hud-title"></div>
    </div>
    <div class="hud-right">
      <span class="hud-pct" id="hud-pct">0%</span>
    </div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog-fill"></div></div>
  <div id="epub-viewer"></div>
  <div id="pdf-viewer"></div>
  <div id="tap-prev" class="tap-zone" onclick="rdrPrev()"></div>
  <div id="tap-next" class="tap-zone" onclick="rdrNext()"></div>
  <div class="reader-footer" id="reader-footer">
    <button class="foot-btn" onclick="rdrPrev()">‹</button>
    <button class="foot-btn" id="btn-bm" onclick="saveBookmark()">♡</button>
    <button class="foot-btn" onclick="openPanel('ps')">⚙</button>
    <button class="foot-btn" onclick="openPanel('pt')">☰</button>
    <button class="foot-btn" onclick="rdrNext()">›</button>
  </div>
</div>

<!-- PDF nav -->
<div class="pdf-nav hidden" id="pdf-nav">
  <button onclick="pdfPrev()">‹</button>
  <span class="pdf-page-info" id="pdf-pi">1 / 1</span>
  <button onclick="pdfNext()">›</button>
</div>

<!-- Settings panel -->
<div class="panel" id="ps" onclick="if(event.target.id==='ps')closePanel('ps')">
  <div class="panel-inner">
    <div class="panel-handle"></div>
    <div class="panel-title">Setări lectură</div>

    <div class="sg">
      <div class="sg-label">Fundal</div>
      <div class="theme-grid">
        <div class="tswatch active" data-t="default" onclick="setTheme('default')" title="Crem"></div>
        <div class="tswatch" data-t="sepia"   onclick="setTheme('sepia')"   title="Sepia"></div>
        <div class="tswatch" data-t="paper"   onclick="setTheme('paper')"   title="Alb"></div>
        <div class="tswatch" data-t="dark"    onclick="setTheme('dark')"    title="Întunecat"></div>
        <div class="tswatch" data-t="night"   onclick="setTheme('night')"   title="Noapte"></div>
        <div class="tswatch" data-t="green"   onclick="setTheme('green')"   title="Verde"></div>
        <div class="tswatch" data-t="blue"    onclick="setTheme('blue')"    title="Albastru"></div>
        <div class="tswatch" data-t="warm"    onclick="setTheme('warm')"    title="Warm Dark"></div>
        <div class="tswatch" data-t="mocha"   onclick="setTheme('mocha')"   title="Mocha"></div>
      </div>
    </div>

    <div class="sg">
      <div class="sg-label">Mărime text</div>
      <div class="fsrow">
        <button onclick="chgFont(-1)">A−</button>
        <span class="fsval" id="fsval">20px</span>
        <button onclick="chgFont(1)">A+</button>
      </div>
    </div>

    <div class="sg">

<script>
// ── PDF.js worker ──
if (window.pdfjsLib) pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── STATE ──
const S = {
  books: [], cur: null, fmt: null,
  epubBook: null, epubRend: null,
  pdfDoc: null, pdfPage: 1, pdfTotal: 1,
  cfg: { theme:'default', fs:20, fk:'crimson', ff:'Crimson Pro,Georgia,serif', lh:1.8 },
  hudOn: true, hudTimer: null,
};

// ── INIT ──
window.addEventListener('DOMContentLoaded', () => {
  loadCfg(); loadBooks(); renderLib();
  setTimeout(() => document.getElementById('loader').classList.add('done'), 400);
});

// ── FIREBASE AUTH ──
window.loginGoogle = async function() {
  if (!window._fb) { showToast('Firebase se inițializează, încearcă din nou...'); return; }
  try {
    await window._fb.signInWithPopup(window._fb.auth, window._fb.prov);

  } catch(e) { showToast('Eroare la conectare: ' + e.message); }
};

window.logoutGoogle = async function() {
  if (!window._fb) return;
  await window._fb.signOut(window._fb.auth);
  showToast('Deconectat');
};

function renderUserArea() {
  const area = document.getElementById('user-area');

  if (!u) {
    area.innerHTML = '<button class="btn-icon" onclick="loginGoogle()" title="Conectare Google"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg></button>';
  } else {

      '</div><span class="u-name">' + name.split(' ')[0] + '</span></button>';
  }
}

// ── CLOUD SYNC ──
async function syncToCloud(id) {
  const u = window._user; if (!u || !window._fb) return;
  const b = S.books.find(x => x.id === id); if (!b) return;
  try {
    await window._fb.setDoc(window._fb.doc(window._fb.db,'users',u.uid,'books',id), {
      id:b.id, title:b.title, format:b.format,
      progress:b.progress||0, bookmark:b.bookmark||null,
      addedAt:b.addedAt, updatedAt:Date.now()
    });
  } catch(e) {}
}

async function syncFromCloud() {
  const u = window._user; if (!u || !window._fb) return;
  try {
    const snap = await window._fb.getDocs(window._fb.collection(window._fb.db,'users',u.uid,'books'));
    snap.forEach(d => {
      const c = d.data();
      const loc = S.books.find(b => b.id === c.id);
      if (loc && (c.updatedAt||0) > (loc.updatedAt||0)) {
        loc.progress = c.progress; loc.bookmark = c.bookmark;
      }
    });
    saveBooks(); renderLib();
  } catch(e) {}
}

// ── LOCAL STORAGE ──
function saveBooks() {
  try { localStorage.setItem('lb', JSON.stringify(S.books.map(b => ({
    id:b.id, title:b.title, format:b.format,
    progress:b.progress, bookmark:b.bookmark,
    addedAt:b.addedAt, updatedAt:b.updatedAt||0
  })))); } catch(e) {}
}
function loadBooks() {
  try { const r = localStorage.getItem('lb'); if(r) S.books = JSON.parse(r); } catch(e) {}
}
function saveCfg() {
  try { localStorage.setItem('lcfg', JSON.stringify(S.cfg)); } catch(e) {}
}
function loadCfg() {
  try {
    const r = localStorage.getItem('lcfg');
    if (r) { S.cfg = {...S.cfg,...JSON.parse(r)}; applyCfgDOM(); }
  } catch(e) {}
}

// ── LIBRARY ──
function renderLib() {
  const grid = document.getElementById('lib-grid');
  const sub  = document.getElementById('lib-sub');
  sub.textContent = S.books.length ? S.books.length + ' carte' + (S.books.length !== 1 ? 'i' : '') : '';
  if (!S.books.length) {
    grid.innerHTML = '<div class="lib-empty"><div class="lib-empty-icon">📚</div><div class="lib-empty-text">Nicio carte încă.<br>Adaugă prima ta carte.</div></div>';
    return;
  }
  grid.innerHTML = '';
  const cols = ['#8b5e2a','#5a7a8b','#6b7a5a','#8b5a6b','#5a6b8b','#7a6b5a','#8b6b5a','#5a8b6b'];
  S.books.forEach((b, i) => {
    const pct = Math.round((b.progress||0)*100);
    const c = cols[i % cols.length];
    const cr = parseInt(c.slice(1,3),16), cg = parseInt(c.slice(3,5),16), cb2 = parseInt(c.slice(5,7),16);
    const c2 = 'rgb('+Math.min(255,cr+55)+','+Math.min(255,cg+55)+','+Math.min(255,cb2+55)+')';
    const circ = 2*Math.PI*10, off = circ*(1-(b.progress||0));
    const ring = pct > 0 ? '<svg class="book-pct-ring" viewBox="0 0 28 28"><circle cx="14" cy="14" r="10" fill="none" stroke="rgba(255,255,255,.2)" stroke-width="2.5"/><circle cx="14" cy="14" r="10" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="2.5" stroke-dasharray="'+circ+'" stroke-dashoffset="'+off+'" stroke-linecap="round" transform="rotate(-90 14 14)"/></svg>' : '';
    const el = document.createElement('div');
    el.className = 'book-card';
    el.style.animationDelay = (i*0.06)+'s';
    el.innerHTML =
      '<div class="book-spine" style="background:linear-gradient(160deg,'+c+' 0%,'+c2+' 100%)" onclick="openBook(\''+b.id+'\')">'
      + '<span class="book-spine-title">'+esc(b.title)+'</span>'+ring+'</div>'
      + '<div class="book-meta"><div class="book-title-label">'+esc(b.title)+'</div>'
      + '<div class="book-pct-label">'+(pct>0?pct+'% citit':b.format.toUpperCase())+'</div></div>'
      + '<div class="book-del"><button onclick="delBook(\''+b.id+'\',event)">✕</button></div>';
    grid.appendChild(el);
  });
}

// ── FILE UPLOAD ──
document.getElementById('file-input').addEventListener('change', async e => {
  for (const f of Array.from(e.target.files)) await addFile(f);
  e.target.value = ''; renderLib();
});

async function addFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['epub','pdf'].includes(ext)) { showToast('Doar EPUB sau PDF'); return; }
  const buf = await file.arrayBuffer();
  const id  = 'b_' + Date.now() + '_' + Math.random().toString(36).slice(2);
  const title = file.name.replace(/\.(epub|pdf)$/i,'').replace(/_/g,' ');
  await idbSet(id, buf);
  S.books.push({ id, title, format:ext, progress:0, bookmark:null, addedAt:Date.now() });
  saveBooks();
  showToast('„'+title+'" adăugată!');
}

// ── INDEXEDDB ──
function idbOpen() {
  return new Promise((res,rej) => {
    const r = indexedDB.open('LDB',1);
    r.onupgradeneeded = e => e.target.result.createObjectStore('f');
    r.onsuccess = e => res(e.target.result);
    r.onerror = () => rej(r.error);
  });
}
async function idbSet(k,v) {
  const db = await idbOpen();
  return new Promise((res,rej) => {
    const tx = db.transaction('f','readwrite');
    tx.objectStore('f').put(v,k);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}
async function idbGet(k) {
  const db = await idbOpen();
  return new Promise((res,rej) => {
    const tx = db.transaction('f','readonly');
    const r  = tx.objectStore('f').get(k);
    r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
  });
}
async function idbDel(k) {
  const db = await idbOpen();
  return new Promise((res,rej) => {
    const tx = db.transaction('f','readwrite');
    tx.objectStore('f').delete(k);
    tx.oncomplete = res; tx.onerror = () => rej(tx.error);
  });
}

// ── DELETE ──
async function delBook(id, e) {
  e.stopPropagation();
  S.books = S.books.filter(b => b.id !== id);
  await idbDel(id);
  saveBooks();
  if (window._user && window._fb) {
    try { await window._fb.deleteDoc(window._fb.doc(window._fb.db,'users',window._user.uid,'books',id)); } catch(e){}
  }
  renderLib();
  showToast('Carte ștearsă');
}

// ── OPEN BOOK ──
async function openBook(id) {
  const b = S.books.find(x => x.id === id); if (!b) return;
  document.getElementById('loader').classList.remove('done');
  const buf = await idbGet(id);
  if (!buf) {
    document.getElementById('loader').classList.add('done');
    showToast('Re-adaugă cartea (fișierul lipsește)'); return;
  }
  S.cur = b; S.fmt = b.format;
  showScreen('screen-reader');
  document.getElementById('hud-title').textContent = b.title;
  updProg(b.progress||0);

  if (b.format === 'epub') {
    document.getElementById('epub-viewer').style.display = 'block';
    document.getElementById('pdf-viewer').style.display  = 'none';
    document.getElementById('tap-prev').style.display = 'block';
    document.getElementById('tap-next').style.display = 'block';
    document.getElementById('pdf-nav').classList.add('hidden');
    await openEpub(buf, b);
  } else {
    document.getElementById('epub-viewer').style.display = 'none';
    document.getElementById('pdf-viewer').style.display  = 'block';
    document.getElementById('tap-prev').style.display = 'none';
    document.getElementById('tap-next').style.display = 'none';
    await openPdf(buf, b);
  }
  document.getElementById('loader').classList.add('done');
  resetHud();
}

// ── EPUB ──
async function openEpub(buf, b) {
  if (S.epubBook) { try { S.epubBook.destroy(); } catch(e){} }
  const book = ePub(buf.slice(0));
  S.epubBook = book;
  const viewer = document.getElementById('epub-viewer');
  viewer.innerHTML = '';
  const rend = book.renderTo(viewer, { width:'100%', height:'100%', flow:'paginated', spread:'none' });
  S.epubRend = rend;
  applyEpubTheme();
  await rend.display(b.bookmark || undefined);
  book.ready.then(() => book.locations.generate(1024));
  rend.on('relocated', loc => {
    const cfi = loc.start.cfi;
    const pct = book.locations.percentageFromCfi(cfi) || 0;
    saveProg(pct, cfi);
  });
  book.loaded.navigation.then(nav => renderTOC(nav.toc));
}

function applyEpubTheme() {
  if (!S.epubRend) return;
  const s = getComputedStyle(document.body);
  const bg = s.getPropertyValue('--bg').trim() || '#f7f2e8';
  const tx = s.getPropertyValue('--text').trim() || '#2a1f0e';
  S.epubRend.themes.default({
    body: { background:bg+' !important', color:tx+' !important',
      'font-family':S.cfg.ff+' !important', 'font-size':S.cfg.fs+'px !important',
      'line-height':S.cfg.lh+' !important', 'max-width':'680px', margin:'0 auto', padding:'20px 26px !important' },
    'p,li': { 'font-size':S.cfg.fs+'px !important', 'line-height':S.cfg.lh+' !important' }
  });
  S.epubRend.themes.select('default');
}

// ── PDF ──
async function openPdf(buf, b) {
  if (!window.pdfjsLib) { showToast('PDF.js nu s-a încărcat'); return; }
  const task = pdfjsLib.getDocument({ data: buf });
  const pdf  = await task.promise;
  S.pdfDoc   = pdf; S.pdfTotal = pdf.numPages;
  S.pdfPage  = b.bookmark ? parseInt(b.bookmark)||1 : Math.max(1, Math.round((b.progress||0)*pdf.numPages));
  document.getElementById('pdf-nav').classList.remove('hidden');
  await renderPdfPage();
}

async function renderPdfPage() {
  if (!S.pdfDoc) return;
  const con = document.getElementById('pdf-viewer');
  con.innerHTML = '';
  const page = await S.pdfDoc.getPage(S.pdfPage);
  const vw   = window.innerWidth - 40;
  const vp0  = page.getViewport({ scale:1 });
  const vp   = page.getViewport({ scale: vw / vp0.width });
  const cv   = document.createElement('canvas');
  cv.width = vp.width; cv.height = vp.height;
  con.appendChild(cv);
  await page.render({ canvasContext:cv.getContext('2d'), viewport:vp }).promise;
  const pct = S.pdfPage / S.pdfTotal;
  saveProg(pct, String(S.pdfPage));
  document.getElementById('pdf-pi').textContent = S.pdfPage + ' / ' + S.pdfTotal;
}

async function pdfPrev() { if(S.pdfPage>1){ S.pdfPage--; await renderPdfPage(); showHud(); } }
async function pdfNext() { if(S.pdfPage<S.pdfTotal){ S.pdfPage++; await renderPdfPage(); showHud(); } }
window.pdfPrev = pdfPrev; window.pdfNext = pdfNext;

// ── PROGRESS ──
function saveProg(pct, cfi) {
  if (!S.cur) return;
  S.cur.progress = pct; S.cur.bookmark = cfi; S.cur.updatedAt = Date.now();
  updProg(pct); saveBooks(); renderLib(); syncToCloud(S.cur.id);
}
function updProg(pct) {
  document.getElementById('hud-pct').textContent  = Math.round(pct*100)+'%';
  document.getElementById('prog-fill').style.width = (pct*100)+'%';
}

function saveBookmark() {
  if (!S.cur) return;
  let cfi = null;
  if (S.fmt==='epub' && S.epubRend) {
    const l = S.epubRend.currentLocation();
    if (l && l.start) cfi = l.start.cfi;
  } else if (S.fmt==='pdf') { cfi = String(S.pdfPage); }
  if (cfi) {
    S.cur.bookmark = cfi; S.cur.updatedAt = Date.now();
    saveBooks(); syncToCloud(S.cur.id);
    document.getElementById('btn-bm').textContent = '♥';
    showToast('Bookmark salvat!');
    setTimeout(() => document.getElementById('btn-bm').textContent = '♡', 2000);
  }
}
window.saveBookmark = saveBookmark;

// ── TOC ──
function renderTOC(toc) {
  const list = document.getElementById('toc-list');
  list.innerHTML = '';
  if (!toc||!toc.length) { list.innerHTML='<p style="color:var(--muted);font-size:14px">Cuprins indisponibil</p>'; return; }
  toc.forEach(item => {
    const btn = document.createElement('button');
    btn.style.cssText='width:100%;text-align:left;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text);font-family:var(--font-body);font-size:14px;cursor:pointer;transition:all .2s;';
    btn.textContent = item.label||item.title||'';
    btn.onclick = () => { if(S.epubRend) S.epubRend.display(item.href); closePanel('pt'); };
    list.appendChild(btn);
  });
}

// ── NAVIGATION ──
function rdrPrev() { if(S.fmt==='epub'&&S.epubRend) S.epubRend.prev(); else pdfPrev(); showHud(); }
function rdrNext() { if(S.fmt==='epub'&&S.epubRend) S.epubRend.next(); else pdfNext(); showHud(); }
window.rdrPrev = rdrPrev; window.rdrNext = rdrNext;

// ── HUD ──
function showHud()  { S.hudOn=true;  document.getElementById('reader-hud').classList.remove('hud-off'); document.getElementById('reader-footer').classList.remove('hud-off'); resetHud(); }
function hideHud()  { S.hudOn=false; document.getElementById('reader-hud').classList.add('hud-off');    document.getElementById('reader-footer').classList.add('hud-off'); }
function resetHud() { clearTimeout(S.hudTimer); S.hudTimer = setTimeout(hideHud, 4000); }

document.getElementById('screen-reader').addEventListener('click', e => {
  const x = e.clientX / window.innerWidth;
  if (x > 0.22 && x < 0.78) { S.hudOn ? hideHud() : showHud(); clearTimeout(S.hudTimer); }
});

// ── SETTINGS ──
function setTheme(t) {
  S.cfg.theme = t;
  document.body.className = t==='default' ? '' : 't-'+t;
  document.querySelectorAll('.tswatch').forEach(s => s.classList.toggle('active', s.dataset.t===t));
  applyEpubTheme(); saveCfg();
}
function chgFont(d) {
  S.cfg.fs = Math.max(14, Math.min(32, S.cfg.fs+d));
  document.getElementById('fsval').textContent = S.cfg.fs+'px';
  applyEpubTheme(); saveCfg();
}
function setFont(k, ff) {
  S.cfg.fk=k; S.cfg.ff=ff;
  document.querySelectorAll('.font-opt').forEach(b => b.classList.toggle('active', b.dataset.fk===k));
  applyEpubTheme(); saveCfg();
}
function setLH(v, btn) {
  S.cfg.lh=v;
  document.querySelectorAll('.lhbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyEpubTheme(); saveCfg();
}
window.setTheme=setTheme; window.chgFont=chgFont; window.setFont=setFont; window.setLH=setLH;

function applyCfgDOM() {
  if (S.cfg.theme && S.cfg.theme!=='default') document.body.classList.add('t-'+S.cfg.theme);
  document.getElementById('fsval').textContent = S.cfg.fs+'px';
  document.querySelectorAll('.tswatch').forEach(s => s.classList.toggle('active', s.dataset.t===(S.cfg.theme||'default')));
  document.querySelectorAll('.font-opt').forEach(b => b.classList.toggle('active', b.dataset.fk===S.cfg.fk));
}

// ── DROPBOX ──
window.dropboxPick = function() {
  if (!window.Dropbox) { showToast('Adaugă Dropbox App Key în fișier'); return; }
  window.Dropbox.choose({
    success: async files => {
      for (const f of files) {
        showToast('Se descarcă: '+f.name+'…');
        try {
          const buf = await (await fetch(f.link)).arrayBuffer();
          await addFile(new File([buf], f.name));
        } catch(e) { showToast('Eroare la descărcare'); }
      }
      renderLib();
    },
    cancel: ()=>{}, linkType:'direct', multiselect:true, extensions:['.epub','.pdf']
  });
};

// ── FULLSCREEN ──
window.toggleFullscreen = function() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {
      showToast('Folosește „Add to Home Screen" pentru fullscreen pe iOS');
    });
  } else { document.exitFullscreen(); }
};

// ── PULL TO REFRESH ──
(function() {
  let sy=0, pulling=false, triggered=false;
  const THR = 80;
  document.addEventListener('touchstart', e => {
    if (!document.getElementById('screen-library').classList.contains('hidden') &&
        document.getElementById('lib-grid').scrollTop <= 0) {
      sy = e.touches[0].clientY; pulling=true; triggered=false;
    }
  }, { passive:true });
  document.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - sy;
    if (dy < 10) return;
    const ptr = document.getElementById('ptr');
    ptr.classList.add('show');
    document.getElementById('ptr-txt').textContent = dy>THR ? 'Eliberează pentru reîncărcare' : 'Trage pentru reîncărcare';
    if (dy > THR) triggered=true;
  }, { passive:true });
  document.addEventListener('touchend', () => {
    if (!pulling) return; pulling=false;
    document.getElementById('ptr').classList.remove('show');
    if (triggered) { showToast('Se reîncarcă...'); setTimeout(() => location.reload(), 300); }
    triggered=false;
  });
})();

// ── PANELS ──
function openPanel(id)  { document.getElementById(id).classList.add('open'); }
function closePanel(id) { document.getElementById(id).classList.remove('open'); }
window.openPanel=openPanel; window.closePanel=closePanel;

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.toggle('hidden', s.id!==id));
}

document.getElementById('btn-back').onclick = () => {
  if (S.epubRend) { try { S.epubRend.destroy(); } catch(e){} S.epubRend=null; }
  S.pdfDoc=null;
  document.getElementById('pdf-nav').classList.add('hidden');
  document.getElementById('epub-viewer').innerHTML='';
  document.getElementById('pdf-viewer').innerHTML='';
  showHud(); showScreen('screen-library'); renderLib();
};

// ── TOAST ──
let _tt;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(_tt); _tt=setTimeout(()=>t.classList.remove('show'), 2800);
}
window.showToast=showToast;

// ── UTILS ──
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
